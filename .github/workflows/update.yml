name: Update Polling Data

on:
  schedule:
    # Every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: forecast-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── Checkout ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python ──
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 pandas

      # ── R ──
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-packages-${{ runner.os }}-4.4-canonicalize-v1

      - name: Install R dependencies
        run: |
          Rscript -e '
            pkgs <- c("tidyverse", "digest")
            to_install <- pkgs[!pkgs %in% installed.packages()[,"Package"]]
            if (length(to_install) > 0) {
              install.packages(to_install, repos = "https://cloud.r-project.org")
            }
            cat("Installed:", paste(pkgs, collapse = ", "), "\n")
          '

      # ── Pipeline ──
      - name: Run pipeline (scrape + canonicalize)
        run: python pipeline.py update-data

      # ── Commit if changed ──
      - name: Commit and push if data changed
        run: |
          git diff --quiet data/polls.csv data/rejected_polls.csv web/public/polling_data/ && {
            echo "No data changes detected — nothing to commit."
            exit 0
          } || {
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/polls.csv data/rejected_polls.csv web/public/polling_data/
            git commit -m "Update polling data [automated]"
            git push
            echo "Pushed updated polling data."
          }

      # ── Error handling ──
      - name: Upload pipeline result on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-result
          path: pipeline_result.json
          retention-days: 7
